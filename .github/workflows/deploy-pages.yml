name: Bootstrap and deploy portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap verified source
        if: ${{ hashFiles('package.json') == '' }}
        run: |
          curl --fail --location --retry 3             https://yunmoxiao-field-notes.fairy-gnat-3713.chatgpt.site/github-source.tar.gz             --output /tmp/github-source.tar.gz
          tar -xzf /tmp/github-source.tar.gz -C .
          git checkout -- .github/workflows/deploy-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Yunmoxiao Tian academic portfolio source"
          git push origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static portfolio
        run: pnpm run build:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
